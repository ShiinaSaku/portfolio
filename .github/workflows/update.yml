name: Update GitHub Actions (PR)

on:
  schedule:
    - cron: "0 3 * * 1"   # weekly
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-actions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run actions-up (update everything)
        run: npx actions-up --yes --mode major --style sha
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: actions-up/updates
          commit-message: "chore: update GitHub Actions (actions-up)"
          title: "chore: update GitHub Actions"
          body: |
            Automated updates using actions-up.

            - Includes major updates
            - Pinned to commit SHAs for security

            Run locally:
            ```bash
            npx actions-up
            ```
          labels: |
            dependencies
            github-actions
      
