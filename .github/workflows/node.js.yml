# https://github.com/actions/deploy-pages#usage
name: Deploy to GitHub Pages
on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: "25.x"
      - run: pnpm install
      - run: pnpm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./.output/public
  
